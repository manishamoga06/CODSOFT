<!DOCTYPE html>
<html lang="en">

<head>

    <!-- Meta -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Title -->
    <title>AquaCalc</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- Container -->
    <div class="container">

        <!-- Heading -->
        <h1 class="title">Calculator</h1>

        <!-- Calculator -->
        <div class="calculator">

            <!-- Display -->
            <input type="text" id="display" placeholder="0" disabled>

            <!-- Grid -->
            <div class="buttons">

                <button class="operator clear">C</button>
                <button class="operator">/</button>
                <button class="operator">*</button>
                <button class="operator">-</button>

                <button>7</button>
                <button>8</button>
                <button>9</button>
                <button class="operator">+</button>

                <button>4</button>
                <button>5</button>
                <button>6</button>
                <button>.</button>

                <button>1</button>
                <button>2</button>
                <button>3</button>
                <button>0</button>

                <button class="equal">=</button>

            </div>

        </div>

    </div>

    <!-- JS -->
    <script src="script.js"></script>

</body>
</html>
